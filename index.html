<script>
/* ====== FIREBASE INIT ====== */
firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();
var db   = firebase.firestore();
var currentUser = null;

function loginWithGoogle(){
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e){
    alert('로그인 실패: ' + e.message);
  });
}
function logout(){
  if(!confirm('로그아웃하시겠어요?')) return;
  auth.signOut();
}

/* ── Firestore helpers ── */
function userDoc(){
  return db.collection('users').doc(currentUser.uid).collection('data').doc('tracker');
}
function showLoading(v){ document.getElementById('loading-screen').classList[v?'add':'remove']('visible'); }
function showLogin(v){   document.getElementById('login-screen').classList[v?'add':'remove']('visible'); }
function showApp(v){     document.getElementById('app').style.display = v ? 'flex' : 'none'; }

async function loadFromFirestore(){
  showLoading(true); showApp(false); showLogin(false);
  try {
    var snap = await userDoc().get();
    if(snap.exists){
      var d = snap.data();
      state.jobs = d.jobs || [];
      state.arts = d.arts || [];
      state.exps = d.exps || [];
      state.lastSaved = d.savedAt || null;
    } else {
      state.jobs = sampleJobs();
      state.arts = sampleArts();
      state.exps = sampleExps();
      await pushToFirestore(true);
    }
  } catch(e){
    console.error(e);
    showToast('데이터 로드 실패: ' + e.message);
  }
  showLoading(false); showApp(true);
  render();
}

var saveTimer = null;
async function pushToFirestore(silent){
  if(!currentUser) return;
  // Debounce: wait 600ms after last change before writing
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async function(){
    try {
      setSyncing(true);
      await userDoc().set({
        jobs: state.jobs,
        arts: state.arts,
        exps: state.exps,
        savedAt: Date.now()
      });
      state.lastSaved = Date.now();
      setSyncing(false);
      if(!silent) showToast('저장됨');
      updateSaveStatus();
    } catch(e){
      setSyncing(false);
      showToast('저장 실패: ' + e.message);
    }
  }, 600);
}
function setSyncing(v){
  var el = document.getElementById('syncing-indicator');
  if(el) el.style.display = v ? 'flex' : 'none';
}

/* auth state listener */
auth.onAuthStateChanged(function(user){
  if(user){
    currentUser = user;
    showLogin(false);
    loadFromFirestore();
  } else {
    currentUser = null;
    showLoading(false);
    showApp(false);
    showLogin(true);
  }
});

  {k:'task',l:'과제 (Task)',c:'#047857',cb:'#ECFDF5',ph:'해결해야 할 과제나 목표는?'},
  {k:'action',l:'행동 (Action)',c:'#6D28D9',cb:'#F5F3FF',ph:'구체적으로 어떤 행동을 취했나요?'},
  {k:'result',l:'결과 (Result)',c:'#B45309',cb:'#FFFBEB',ph:'어떤 결과를 얻었나요? 수치로 표현하면 더욱 좋습니다.'},
];

/* ====== STATE ====== */
var state={
  page:'tracker',jobs:[],arts:[],exps:[],
  selId:null,tab:'기본정보',view:'list',
  cat:'전체',astats:[],sort:'deadline',search:'',
  modal:null,editJob:null,delConfirm:false,
  calY:new Date().getFullYear(),calM:new Date().getMonth(),
  selArt:null,editArt:null,selExp:null,editExp:null,

/* ====== SAVE (replaces localStorage) ====== */
function saveAll(silent){ pushToFirestore(silent); }

function updateSaveStatus(){
  var el=document.getElementById('save-status');
  if(!el||!state.lastSaved)return;
  var diff=Math.round((Date.now()-state.lastSaved)/1000);
  if(diff<5)el.textContent='방금 저장됨 ✓';
  else if(diff<60)el.textContent=diff+'초 전 저장';
  else el.textContent=Math.round(diff/60)+'분 전 저장';
}
setInterval(updateSaveStatus,15000);

function showToast(msg){
  var t=document.getElementById('toast'),m=document.getElementById('toast-msg');
  if(!t)return;
  m.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ====== SAMPLES ====== */
function sampleJobs(){var n=Date.now();return[
  {id:n+1,company:'카카오',role:'프론트엔드 개발자',status:'int1',deadline:'2026-04-10',deadlineTime:'18:00',interviews:['2026-03-25'],industry:'IT/플랫폼',siteUrl:'https://careers.kakao.com',jd:'- React, TypeScript 기반 서비스 개발\n- 사용자 경험 개선 및 성능 최적화\n자격요건: React 2년 이상, TypeScript 능숙',ia:'',ca:'국내 최대 메신저 플랫폼.',ja:'React 기반 프론트엔드 개발.',cls:[{id:n+10,q:'지원동기를 작성해주세요.',a:'카카오의 기술 문화에 매력을 느껴 지원하였습니다.',lim:500}],memo:'1차 면접 3/25 오후 2시',ca_at:n},
  {id:n+2,company:'네이버',role:'UX 디자이너',status:'applied',deadline:'2026-04-22',deadlineTime:'23:59',interviews:[],industry:'검색/IT',siteUrl:'',jd:'',ia:'',ca:'',ja:'',cls:[],memo:'',ca_at:n-86400000*2},
  {id:n+3,company:'삼성전자',role:'데이터 분석가',status:'none',deadline:'2026-04-30',deadlineTime:'',interviews:[],industry:'전자/반도체',siteUrl:'',jd:'',ia:'',ca:'',ja:'',cls:[],memo:'',ca_at:n},
];}

  {id:n+100,title:'2026 IT기업 상반기 채용 전망',url:'',company:'공통',tags:['IT','채용트렌드'],memo:'상반기 채용 규모 전년 대비 15% 확대 예상.\n클라우드·AI 인재 수요 급증.',date:'2026-03-10',ca_at:n},
];}
function sampleExps(){var n=Date.now();return[
  {id:n+200,title:'팀 프로젝트 리더 경험',tags:['리더십','협업'],situation:'4인 팀 캡스톤에서 일정 충돌 발생.',task:'팀원 간 역할 명확화 및 마감일 준수.',action:'매일 15분 스탠드업 미팅 도입, Notion 업무 트래킹.',result:'예정 대비 2일 빠르게 완료, 우수상 수상.',ca_at:n},
];}

/* ====== HELPERS ====== */
function gs(id){return ST.find(s=>s.id===id)||ST[0];}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function fd(s){if(!s)return'';var d=new Date(s+'T00:00');return d.getFullYear()+'.'+(d.getMonth()+1+'').padStart(2,'0')+'.'+(''+d.getDate()).padStart(2,'0');}
function fmt12(t){if(!t)return'';var[h,m]=t.split(':').map(Number);return(h>=12?'오후':'오전')+' '+(h%12||12)+':'+(m+'').padStart(2,'0');}
function dday(date,time){
  if(!date)return{label:'',color:H};
  var tgt=new Date(date+'T'+(time||'23:59'));var now=new Date();var diff=tgt-now;
  if(diff<0)return{label:'마감완료',color:H};
  var days=Math.floor(diff/86400000);
  if(days===0){var hrs=Math.floor(diff/3600000);return hrs<1?{label:'마감완료',color:H}:{label:hrs+'시간 남음',color:'#DC2626'};}
  if(days<=3)return{label:'D-'+days,color:'#DC2626'};
  if(days<=7)return{label:'D-'+days,color:'#D97706'};
  return{label:'D-'+days,color:'#059669'};
}
function getFiltered(){
  var jobs=state.jobs.slice();
  if(state.search){var q=state.search.toLowerCase();jobs=jobs.filter(j=>j.company.toLowerCase().includes(q)||j.role.toLowerCase().includes(q));}
  if(state.cat!=='전체'){var c=CATS.find(x=>x.id===state.cat);if(c&&c.statuses){var al=state.astats.length?state.astats:c.statuses;jobs=jobs.filter(j=>al.includes(j.status));}}
  jobs.sort((a,b)=>{
    if(state.sort==='deadline'){if(!a.deadline)return 1;if(!b.deadline)return-1;return a.deadline.localeCompare(b.deadline);}
    if(state.sort==='company')return a.company.localeCompare(b.company);
    if(state.sort==='status')return ST.findIndex(s=>s.id===a.status)-ST.findIndex(s=>s.id===b.status);
    return b.ca_at-a.ca_at;
  });
  return jobs;
}

/* ====== RENDER ====== */
function render(){
  document.getElementById('app').innerHTML=buildApp();
  attachAll();
  updateSaveStatus();
}

function buildApp(){
  return buildHeader()+
    '<div class="body">'+buildSidebar()+buildPage()+'</div>'+
    (state.modal?buildModal():'')+
    (state.analysisJob?buildAnalysisFull():'');
}

function buildHeader(){
  var cur=NAV.find(n=>n.id===state.page);
  var photoURL = currentUser&&currentUser.photoURL;
  var displayName = currentUser&&currentUser.displayName ? currentUser.displayName.split(' ')[0] : '';
  return '<div class="header">'+
    '<div class="header-left">'+
      '<span class="header-title">취업 트래커</span>'+
      '<span class="header-badge">'+(cur?cur.label:'')+'</span>'+
    '</div>'+
    '<div class="header-center">'+
      '<span id="save-status" class="save-status"></span>'+
      '<span id="syncing-indicator" class="syncing" style="display:none;">'+
        '<span class="syncing-dot"></span>저장 중'+
      '</span>'+
    '</div>'+
    '<div class="header-right">'+
      (state.page==='tracker'?
        '<button class="btn-header btn-cal" onclick="toggleView()">'+(state.view==='cal'?'목록보기':'달력보기')+'</button>'+
        '<button class="btn-header btn-add" onclick="openAdd()">+ 추가</button>'
      :state.page==='articles'?'<button class="btn-header btn-add" onclick="openAddArt()">+ 기사</button>'
      :state.page==='experience'?'<button class="btn-header btn-add" onclick="openAddExp()">+ 경험</button>':'')+
      (photoURL?'<img src="'+esc(photoURL)+'" class="user-avatar" title="'+esc(displayName)+'">':'')+
      (displayName?'<span class="user-name">'+esc(displayName)+'</span>':'')+
      '<button class="btn-header btn-logout" onclick="logout()">로그아웃</button>'+
    '</div>'+
  '</div>';
}

function buildSidebar(){
  return '<div class="sidebar">'+
    NAV.map(n=>'<button class="nav-btn'+(state.page===n.id?' active':'')+'" onclick="navTo(\''+n.id+'\')">'+
      '<span class="nav-icon" style="color:'+(state.page===n.id?M:H)+'">'+n.sym+'</span>'+
      '<span class="nav-label" style="color:'+(state.page===n.id?M:H)+'">'+n.label+'</span>'+
    '</button>').join('')+
  '</div>';
}

function buildPage(){
  if(state.page==='tracker')return'<div id="main-panels" style="display:flex;flex:1;overflow:hidden;">'+(state.view==='cal'?buildCal():buildLeft())+'<div class="resizer" id="main-resizer" onmousedown="startResize(event,\'main-resizer\',\'left-panel\')"></div>'+buildRight()+'</div>';
  if(state.page==='cover')return buildCoverPage();
  if(state.page==='articles')return buildArtsPage();
  if(state.page==='experience')return buildExpPage();
  if(state.page==='passbank')return buildPassBank();
  return '';
}

/* ====== LEFT PANEL ====== */
function buildLeft(){
  var flt=getFiltered();
  var w=state.leftW||240;
  return '<div class="left" id="left-panel" style="width:'+w+'px;">'+
    '<div class="search-box"><input type="text" placeholder="검색..." value="'+esc(state.search)+'" oninput="setSearch(this.value)"></div>'+
    buildFilter()+
    '<div class="list-area">'+(flt.length?flt.map(buildCard).join(''):'<div class="no-sel">공고가 없습니다</div>')+'</div>'+
  '</div>';
}
function buildFilter(){
  var cat=CATS.find(c=>c.id===state.cat),sub=cat&&cat.statuses;
  return '<div class="filter-panel">'+
    '<div class="filter-inner">'+
      '<div class="flabel">카테고리</div>'+
      '<div class="cat-grid">'+
        CATS.map(c=>{var on=state.cat===c.id,cnt=c.statuses?state.jobs.filter(j=>c.statuses.includes(j.status)).length:state.jobs.length;
          return'<button class="cat-btn'+(on?' active':'')+'" onclick="setCat(\''+c.id+'\')" style="'+(on?'border-color:'+c.ac+';background:'+c.abg+';':'')+'">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;">'+
              '<span class="cat-name" style="color:'+(on?c.ac:'#333')+'">'+c.label+'</span>'+
              '<span class="cat-cnt" style="background:'+(on?c.ac+'22':ML)+';color:'+(on?c.ac:MU)+'">'+cnt+'</span>'+
            '</div>'+
          '</button>';}).join('')+
      '</div>'+
    '</div>'+
    (sub?
      '<div style="padding:5px 10px;">'+
        '<div class="flabel">세부 상태 <span style="font-weight:400;color:'+H+'">복수선택</span></div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:3px;">'+
          sub.map(sid=>{var s=gs(sid),on=state.astats.includes(sid);return'<button class="chip'+(on?' active':'')+'" onclick="toggleStat(\''+sid+'\')" style="'+(on?'border-color:'+s.c+';background:'+s.bg+';color:'+s.c+';':'color:'+s.c+';')+'">'+s.label+'</button>';}).join('')+
          '<button class="chip" onclick="clearStats()" style="color:'+H+'">전체</button>'+
        '</div>'+
      '</div>'+
      '<div class="sort-row"><span class="flabel" style="margin:0">정렬</span>'+
        '<select onchange="setSort(this.value)" style="font-size:9px;border:1px solid '+MM+';border-radius:5px;padding:1px 4px;background:'+MB+';outline:none;color:#1a1a1a;">'+
          [['deadline','마감일순'],['company','회사명순'],['status','상태순'],['created','등록순']].map(([id,l])=>'<option value="'+id+'"'+(state.sort===id?' selected':'')+'>'+l+'</option>').join('')+
        '</select>'+
      '</div>':
      '<div class="sort-row"><span class="flabel" style="margin:0">정렬</span>'+
        [['deadline','마감일'],['company','회사명'],['status','상태'],['created','등록']].map(([id,l])=>{var on=state.sort===id;return'<button class="chip'+(on?' active':'')+'" onclick="setSort(\''+id+'\')" style="'+(on?'border-color:'+M+';background:'+ML+';color:'+M+';':'')+'">'+l+'</button>';}).join('')+
      '</div>'
    )+
  '</div>';
}
function buildCard(job){

/* ====== DIRTY TRACKING ====== */
function markDirty(dk,taId,field){
  state.dirty[dk]=true;
  var box=document.getElementById('box-'+dk),btn=document.getElementById('savebtn-'+dk),cnt=document.getElementById('cnt-'+taId),ta=document.getElementById(taId);
  if(box){box.style.borderColor='#FDE68A';box.style.background='#FEFDF5';}
  if(btn){btn.disabled=false;btn.style.background=M;btn.style.color='#fff';btn.style.opacity='1';btn.style.cursor='pointer';}
  if(cnt&&ta)cnt.textContent=ta.value.length+'자';
}
function saveField(dk,taId,field){
  var ta=document.getElementById(taId);if(!ta)return;
  var job=state.jobs.find(j=>j.id===state.selId);if(!job)return;
  job[field]=ta.value;delete state.dirty[dk];saveAll();render();
}
function markDirtySite(dk){
  state.dirty[dk]=true;
  var box=document.getElementById('box-'+dk),btn=document.getElementById('savebtn-'+dk);
  if(box){box.style.borderColor='#FDE68A';box.style.background='#FEFDF5';}
  if(btn){btn.disabled=false;btn.style.background=M;btn.style.color='#fff';btn.style.opacity='1';btn.style.cursor='pointer';}
}
function saveSiteUrl(dk){
  var inp=document.getElementById('inp-siteUrl');if(!inp)return;
  var job=state.jobs.find(j=>j.id===state.selId);if(!job)return;
  job.siteUrl=inp.value.trim();delete state.dirty[dk];saveAll();render();
}
function markCLDirty(dk,clId){
  state.dirty[dk]=true;
  var box=document.getElementById('box-'+dk),btn=document.getElementById('savebtn-'+dk);
  if(box){box.classList.add('dirty');}
  if(btn){btn.disabled=false;btn.style.background=M;btn.removeAttribute('style');}
  var ta=document.getElementById('cl-ta-'+clId),lim=document.getElementById('cl-lim-'+clId),cnt=document.getElementById('cl-cnt-'+clId);
  if(ta&&cnt){var len=ta.value.length,limV=lim?+lim.value:0,over=limV&&len>limV;cnt.textContent=len+'자'+(limV?' / '+limV+'자'+(over?' ⚠ 초과!':''):'');cnt.style.color=over?'#DC2626':H;ta.style.borderColor=over?'#FCA5A5':'';}
}
function saveCL(clId){
  var job=state.jobs.find(j=>j.id===state.selId);if(!job)return;
  var cl=job.cls.find(c=>c.id===clId);if(!cl)return;
  var ta=document.getElementById('cl-ta-'+clId),qi=document.getElementById('cl-q-'+clId),li=document.getElementById('cl-lim-'+clId);
  if(ta)cl.a=ta.value;if(qi)cl.q=qi.value;if(li)cl.lim=+li.value;
  delete state.dirty['cl_'+clId];saveAll();render();
}

/* ====== CALENDAR ====== */
function buildCal(){
  var y=state.calY,m=state.calM,first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  var evs={};
  state.jobs.forEach(job=>{
    if(job.deadline){var d=new Date(job.deadline+'T00:00');if(d.getFullYear()===y&&d.getMonth()===m){var k=d.getDate();if(!evs[k])evs[k]=[];evs[k].push({t:'d',job});}}
    (job.interviews||[]).forEach(iv=>{var d=new Date(iv+'T00:00');if(d.getFullYear()===y&&d.getMonth()===m){var k=d.getDate();if(!evs[k])evs[k]=[];evs[k].push({t:'i',job});}});
  });
  var cells='';
  for(var i=0;i<first;i++)cells+='<div></div>';
  for(var d=1;d<=days;d++){
    var isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var ev=evs[d]||[];
    cells+='<div class="cal-cell'+(isT?' today':'')+'">'+
      '<div style="font-size:13px;font-weight:'+(isT?700:500)+';color:'+(isT?M:'#444')+';margin-bottom:4px;">'+d+'</div>'+
      ev.slice(0,3).map(e=>'<div class="cal-ev '+(e.t==='d'?'dl':'iv')+'" onclick="calSel('+e.job.id+')">'+esc(e.job.company)+(e.t==='i'?' 면접':'')+'</div>').join('')+
      (ev.length>3?'<div style="font-size:10px;color:'+H+';margin-top:2px;">+'+( ev.length-3)+' 더</div>':'')+
    '</div>';
  }
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return '<div class="cal-wrap">'+
    '<div class="cal-nav">'+
      '<button class="cal-nbtn" onclick="calPrev()">&#8249;</button>'+
      '<span style="font-weight:700;font-size:18px;">'+y+'년 '+mn[m]+'</span>'+
      '<button class="cal-nbtn" onclick="calNext()">&#8250;</button>'+
      '<div style="margin-left:auto;display:flex;gap:12px;font-size:12px;color:'+MU+';">'+
        '<span><span style="display:inline-block;width:10px;height:10px;background:#D1FAE5;border-radius:3px;margin-right:4px;vertical-align:middle"></span>마감</span>'+
        '<span><span style="display:inline-block;width:10px;height:10px;background:#FEF3C7;border-radius:3px;margin-right:4px;vertical-align:middle"></span>면접</span>'+
        '<span style="color:'+H+';font-size:11px;">클릭하면 상세로 이동</span>'+
      '</div>'+
    '</div>'+
    '<div class="cal-grid">'+['일','월','화','수','목','금','토'].map(d=>'<div class="cal-dh">'+d+'</div>').join('')+'</div>'+
    '<div class="cal-grid" style="overflow-y:auto;flex:1;align-content:start;margin-top:3px;">'+cells+'</div>'+
  '</div>';
}

/* ====== RESIZE ====== */
function startResize(e,resizerId,panelId){
  e.preventDefault();
  var panel=document.getElementById(panelId);
  var resizer=document.getElementById(resizerId);
  if(!panel)return;
  resizer.classList.add('dragging');
  var startX=e.clientX;
  var startW=panel.offsetWidth;
  function onMove(e){
    var newW=startW+(e.clientX-startX);
    newW=Math.max(160,Math.min(500,newW));
    panel.style.width=newW+'px';
    state.leftW=newW;
  }
  function onUp(){
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.body.style.cursor='';
    document.body.style.userSelect='';
  }
  document.body.style.cursor='col-resize';
  document.body.style.userSelect='none';
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}
