<style>
/* ===== TOSS STYLE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;font-size:16px;background:#F2F4F6;color:#191F28;-webkit-font-smoothing:antialiased;}

.header-right{display:flex;gap:8px;align-items:center;}
.btn-header{border:none;color:#fff;padding:6px 13px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;}
.btn-cal{background:rgba(255,255,255,0.2);}
.btn-add{background:#fff;color:var(--mint);font-weight:700;}

.page{display:flex;flex:1;overflow:hidden;}
.left{width:260px;display:flex;flex-direction:column;border-right:1px solid var(--br);background:#fff;overflow:hidden;flex-shrink:0;}

.cover-q-input{flex:1;border:none;border-bottom:1.5px solid var(--br);padding:3px 5px;font-size:14px;outline:none;background:transparent;font-weight:600;color:var(--text1);min-width:0;}

.cover-save-btn:disabled{background:var(--mintm);cursor:default;}
.btn-del-cover{border:none;background:#FFF5F5;color:#E53E3E;padding:5px 9px;border-radius:7px;font-size:11px;cursor:pointer;font-weight:600;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#191F28;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:999;display:flex;align-items:center;gap:8px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.2);}

.pass-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 9px;background:#D1FAE5;color:#065F46;border-radius:20px;font-weight:700;}

.cl-q-num{font-size:11px;background:var(--mintl);color:var(--mint);padding:3px 10px;border-radius:20px;font-weight:700;}

.cl-meta{font-size:11px;color:var(--h);margin-top:8px;display:flex;justify-content:space-between;font-weight:500;}
.analysis-full{position:fixed;inset:0;background:#F2F4F6;z-index:300;display:flex;flex-direction:column;}
.analysis-full-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--br);background:#fff;flex-shrink:0;}
.analysis-full-content{flex:1;overflow-y:auto;padding:24px;max-width:860px;margin:0 auto;width:100%;}

.analysis-tab{padding:9px 18px;border-radius:20px;border:1.5px solid var(--br);background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;color:var(--mu);}
.analysis-tab.active{background:var(--mint);color:#fff;border-color:var(--mint);}

.empty{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;flex:1;}
.empty-icon{font-size:36px;opacity:0.15;}
.no-sel{color:var(--h);font-size:13px;text-align:center;padding:24px 12px;line-height:1.8;font-weight:500;}
.del-confirm{display:flex;align-items:center;gap:6px;}
#login-screen{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#E8F7F0 0%,#F4FAF7 50%,#fff 100%);z-index:500;flex-direction:column;align-items:center;justify-content:center;}
#login-screen.visible{display:flex;}
.login-card{background:#fff;border-radius:24px;padding:48px 44px;box-shadow:0 8px 48px rgba(62,180,137,0.12);width:380px;text-align:center;}
.login-logo{font-size:48px;margin-bottom:14px;}
.login-title{font-size:24px;font-weight:800;color:var(--text1);margin-bottom:8px;letter-spacing:-0.7px;}
.login-sub{font-size:15px;color:var(--mu);margin-bottom:36px;line-height:1.65;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border:1.5px solid #E8EDF2;border-radius:12px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;color:var(--text1);}
.btn-google:hover{border-color:var(--mintm);background:var(--mintl);}
.google-icon{width:22px;height:22px;}

#loading-screen.visible{display:flex;}
.spinner{width:40px;height:40px;border:3px solid var(--mintm);border-top-color:var(--mint);border-radius:50%;animation:spin 0.75s linear infinite;}

.loading-txt{font-size:15px;color:var(--mu);font-weight:500;}
.syncing{font-size:12px;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:5px;font-weight:500;}
.syncing-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.8);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:1;}}

/* ===== STUDY TAB ===== */
.study-layout{display:flex;flex:1;overflow:hidden;}
.study-left{width:220px;flex-shrink:0;border-right:1px solid var(--br);background:#fff;display:flex;flex-direction:column;overflow:hidden;}

<body>

<!-- Loading -->
<div id="loading-screen" class="visible">
  <div class="spinner"></div>
  <div class="loading-txt">불러오는 중...</div>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">

      </svg>
      Google 계정으로 시작하기
    </button>
    <div class="login-notice">로그인하면 데이터가 클라우드에 저장되어<br>어떤 기기에서도 동일하게 볼 수 있어요.</div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;flex-direction:column;height:100vh;overflow:hidden;"></div>
<div id="toast"><span class="tick">✓</span><span id="toast-msg">저장됨</span></div>

<script>
/* ====== FIREBASE INIT ====== */
firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();
var db   = firebase.firestore();
var currentUser = null;

function loginWithGoogle(){
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e){
    alert('로그인 실패: ' + e.message);
  });
}
function logout(){
  if(!confirm('로그아웃하시겠어요?')) return;
  auth.signOut();
}

/* ── Firestore helpers ── */
function userDoc(){
  return db.collection('users').doc(currentUser.uid).collection('data').doc('tracker');
}
function showLoading(v){ document.getElementById('loading-screen').classList[v?'add':'remove']('visible'); }
function showLogin(v){   document.getElementById('login-screen').classList[v?'add':'remove']('visible'); }
function showApp(v){     document.getElementById('app').style.display = v ? 'flex' : 'none'; }

async function loadFromFirestore(){
  showLoading(true); showApp(false); showLogin(false);
  try {
    var snap = await userDoc().get();
    if(snap.exists){
      var d = snap.data();
      state.jobs = d.jobs || [];
      state.arts = d.arts || [];
      state.exps = d.exps || [];
      state.lastSaved = d.savedAt || null;
    } else {
      state.jobs = sampleJobs();
      state.arts = sampleArts();
      state.exps = sampleExps();
      await pushToFirestore(true);
    }
  } catch(e){
    console.error(e);
    showToast('데이터 로드 실패: ' + e.message);
  }
  showLoading(false); showApp(true);
  render();
  loadMyStudies();
}

var saveTimer = null;
async function pushToFirestore(silent){
  if(!currentUser) return;
  // Debounce: wait 600ms after last change before writing
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async function(){
    try {
      setSyncing(true);
      await userDoc().set({
        jobs: state.jobs,
        arts: state.arts,
        exps: state.exps,
        savedAt: Date.now()
      });
      state.lastSaved = Date.now();
      setSyncing(false);
      if(!silent) showToast('저장됨');
      updateSaveStatus();
    } catch(e){
      setSyncing(false);
      showToast('저장 실패: ' + e.message);
    }
  }, 600);
}
function setSyncing(v){
  var el = document.getElementById('syncing-indicator');
  if(el) el.style.display = v ? 'flex' : 'none';
}

/* auth state listener */
auth.onAuthStateChanged(function(user){
  if(user){
    currentUser = user;
    showLogin(false);
    loadFromFirestore();
  } else {
    currentUser = null;
    showLoading(false);
    showApp(false);
    showLogin(true);
  }
});

/* ====== APP CONSTANTS ====== */
var M='#3EB489',ML='#E8F7F0',MM='#B8E8D4',MB='#F4FAF7',BR='#D1EAE0',MU='#6B9E87',H='#9CA3AF';

var ST=[
  {id:'none',label:'미지원',c:'#6B7280',bg:'#F3F4F6',grp:'준비'},
  {id:'writing',label:'작성시작',c:'#B45309',bg:'#FEF3C7',grp:'준비'},
  {id:'applied',label:'지원완료',c:'#1D4ED8',bg:'#DBEAFE',grp:'준비'},
  {id:'docs',label:'서류제출',c:'#0E7490',bg:'#CFFAFE',grp:'전형'},
  {id:'apt',label:'인적성',c:'#6D28D9',bg:'#EDE9FE',grp:'전형'},
  {id:'int1',label:'면접1차',c:'#047857',bg:'#D1FAE5',grp:'전형'},
  {id:'int2',label:'면접2차',c:'#065F46',bg:'#A7F3D0',grp:'전형'},
  {id:'int3',label:'면접3차',c:'#064E3B',bg:'#6EE7B7',grp:'전형'},
  {id:'pending',label:'미발표',c:'#7C3AED',bg:'#EDE9FE',grp:'결과'},
  {id:'docs_fail',label:'서류탈락',c:'#B91C1C',bg:'#FEE2E2',grp:'결과'},
  {id:'int_fail',label:'면접탈락',c:'#DC2626',bg:'#FECACA',grp:'결과'},
  {id:'pass',label:'최종합격',c:'#fff',bg:'#3EB489',grp:'결과'},
];
var CATS=[
  {id:'전체',label:'전체',desc:'모든 공고',statuses:null,ac:'#6B7280',abg:'#F3F4F6'},
  {id:'준비',label:'준비 중',desc:'미지원·작성·완료',statuses:['none','writing','applied'],ac:'#1D4ED8',abg:'#DBEAFE'},
  {id:'전형',label:'전형 진행',desc:'서류·인적성·면접',statuses:['docs','apt','int1','int2','int3'],ac:'#047857',abg:'#D1FAE5'},
  {id:'결과',label:'결과',desc:'미발표·탈락·합격',statuses:['pending','docs_fail','int_fail','pass'],ac:'#DC2626',abg:'#FEE2E2'},
];
var NAV=[
  {id:'tracker',label:'채용공고',sym:'≡'},
  {id:'cover',label:'자소서',sym:'✎'},
  {id:'articles',label:'기사',sym:'◫'},
  {id:'experience',label:'경험',sym:'◈'},
  {id:'passbank',label:'합격자소서',sym:'★'},
  {id:'study',label:'스터디',sym:'⏱'},
];
var STAR_KEYS=[
  {k:'situation',l:'상황 (Situation)',c:'#1D4ED8',cb:'#EFF6FF',ph:'어떤 상황이었나요?'},
  {k:'task',l:'과제 (Task)',c:'#047857',cb:'#ECFDF5',ph:'해결해야 할 과제나 목표는?'},
  {k:'action',l:'행동 (Action)',c:'#6D28D9',cb:'#F5F3FF',ph:'구체적으로 어떤 행동을 취했나요?'},
  {k:'result',l:'결과 (Result)',c:'#B45309',cb:'#FFFBEB',ph:'어떤 결과를 얻었나요? 수치로 표현하면 더욱 좋습니다.'},
];

/* ====== STATE ====== */
var state={
  page:'tracker',jobs:[],arts:[],exps:[],
  selId:null,tab:'기본정보',view:'list',
  cat:'전체',astats:[],sort:'deadline',search:'',
  modal:null,editJob:null,delConfirm:false,
  calY:new Date().getFullYear(),calM:new Date().getMonth(),
  selArt:null,editArt:null,selExp:null,editExp:null,
  lastSaved:null,dirty:{},leftW:260,
  analysisJob:null,analysisTab:'ia',
  studyTab:'timer',myStudies:[],selStudy:null,
  timerRunning:false,timerPaused:false,timerElapsed:0,timerSessionId:null,timerInterval:null,
  timerSessions:[],
  sharedTodos:[],personalTodos:[],
  posts:[],selPost:null,showQAForm:false,showAnsForm:false,
  studyModal:null,studyMembers:{},
  studyCalY:new Date().getFullYear(),studyCalM:new Date().getMonth(),
  _studyUnsub:[],
};

/* ====== SAVE (replaces localStorage) ====== */
function saveAll(silent){ pushToFirestore(silent); }

function updateSaveStatus(){
  var el=document.getElementById('save-status');
  if(!el||!state.lastSaved)return;
  var diff=Math.round((Date.now()-state.lastSaved)/1000);
  if(diff<5)el.textContent='방금 저장됨 ✓';
  else if(diff<60)el.textContent=diff+'초 전 저장';
  else el.textContent=Math.round(diff/60)+'분 전 저장';
}
setInterval(updateSaveStatus,15000);

function showToast(msg){
  var t=document.getElementById('toast'),m=document.getElementById('toast-msg');
  if(!t)return;
  m.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ====== SAMPLES ====== */
function sampleJobs(){var n=Date.now();return[
  {id:n+1,company:'카카오',role:'프론트엔드 개발자',status:'int1',deadline:'2026-04-10',deadlineTime:'18:00',interviews:['2026-03-25'],industry:'IT/플랫폼',siteUrl:'https://careers.kakao.com',jd:'- React, TypeScript 기반 서비스 개발\n- 사용자 경험 개선 및 성능 최적화\n자격요건: React 2년 이상, TypeScript 능숙',ia:'',ca:'국내 최대 메신저 플랫폼.',ja:'React 기반 프론트엔드 개발.',cls:[{id:n+10,q:'지원동기를 작성해주세요.',a:'카카오의 기술 문화에 매력을 느껴 지원하였습니다.',lim:500}],memo:'1차 면접 3/25 오후 2시',ca_at:n},
  {id:n+2,company:'네이버',role:'UX 디자이너',status:'applied',deadline:'2026-04-22',deadlineTime:'23:59',interviews:[],industry:'검색/IT',siteUrl:'',jd:'',ia:'',ca:'',ja:'',cls:[],memo:'',ca_at:n-86400000*2},
  {id:n+3,company:'삼성전자',role:'데이터 분석가',status:'none',deadline:'2026-04-30',deadlineTime:'',interviews:[],industry:'전자/반도체',siteUrl:'',jd:'',ia:'',ca:'',ja:'',cls:[],memo:'',ca_at:n},
];}
function sampleArts(){var n=Date.now();return[
  {id:n+100,title:'2026 IT기업 상반기 채용 전망',url:'',company:'공통',tags:['IT','채용트렌드'],memo:'상반기 채용 규모 전년 대비 15% 확대 예상.\n클라우드·AI 인재 수요 급증.',date:'2026-03-10',ca_at:n},
];}
function sampleExps(){var n=Date.now();return[
  {id:n+200,title:'팀 프로젝트 리더 경험',tags:['리더십','협업'],situation:'4인 팀 캡스톤에서 일정 충돌 발생.',task:'팀원 간 역할 명확화 및 마감일 준수.',action:'매일 15분 스탠드업 미팅 도입, Notion 업무 트래킹.',result:'예정 대비 2일 빠르게 완료, 우수상 수상.',ca_at:n},
];}

/* ====== HELPERS ====== */
function gs(id){return ST.find(s=>s.id===id)||ST[0];}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function fd(s){if(!s)return'';var d=new Date(s+'T00:00');return d.getFullYear()+'.'+(d.getMonth()+1+'').padStart(2,'0')+'.'+(''+d.getDate()).padStart(2,'0');}
function fmt12(t){if(!t)return'';var[h,m]=t.split(':').map(Number);return(h>=12?'오후':'오전')+' '+(h%12||12)+':'+(m+'').padStart(2,'0');}
function dday(date,time){
  if(!date)return{label:'',color:H};
  var tgt=new Date(date+'T'+(time||'23:59'));var now=new Date();var diff=tgt-now;
  if(diff<0)return{label:'마감완료',color:H};
  var days=Math.floor(diff/86400000);
  if(days===0){var hrs=Math.floor(diff/3600000);return hrs<1?{label:'마감완료',color:H}:{label:hrs+'시간 남음',color:'#DC2626'};}
  if(days<=3)return{label:'D-'+days,color:'#DC2626'};
  if(days<=7)return{label:'D-'+days,color:'#D97706'};
  return{label:'D-'+days,color:'#059669'};
}
function getFiltered(){
  var jobs=state.jobs.slice();
  if(state.search){var q=state.search.toLowerCase();jobs=jobs.filter(j=>j.company.toLowerCase().includes(q)||j.role.toLowerCase().includes(q));}
  if(state.cat!=='전체'){var c=CATS.find(x=>x.id===state.cat);if(c&&c.statuses){var al=state.astats.length?state.astats:c.statuses;jobs=jobs.filter(j=>al.includes(j.status));}}
  jobs.sort((a,b)=>{
    if(state.sort==='deadline'){if(!a.deadline)return 1;if(!b.deadline)return-1;return a.deadline.localeCompare(b.deadline);}
    if(state.sort==='company')return a.company.localeCompare(b.company);
    if(state.sort==='status')return ST.findIndex(s=>s.id===a.status)-ST.findIndex(s=>s.id===b.status);
    return b.ca_at-a.ca_at;
  });
  return jobs;
}

/* ====== RENDER ====== */
function render(){
  document.getElementById('app').innerHTML=buildApp();
  attachAll();
  updateSaveStatus();
}

function buildApp(){
  return buildHeader()+
    '<div class="body">'+buildSidebar()+buildPage()+'</div>'+
    (state.modal?buildModal():'')+
    (state.analysisJob?buildAnalysisFull():'');
}

function buildHeader(){
  var cur=NAV.find(n=>n.id===state.page);
  var photoURL = currentUser&&currentUser.photoURL;
  var displayName = currentUser&&currentUser.displayName ? currentUser.displayName.split(' ')[0] : '';
  return '<div class="header">'+
    '<div class="header-left">'+
      '<span class="header-title">취업 트래커</span>'+
      '<span class="header-badge">'+(cur?cur.label:'')+'</span>'+
    '</div>'+
    '<div class="header-center">'+
      '<span id="save-status" class="save-status"></span>'+
      '<span id="syncing-indicator" class="syncing" style="display:none;">'+
        '<span class="syncing-dot"></span>저장 중'+
      '</span>'+
    '</div>'+
    '<div class="header-right">'+
      (state.page==='tracker'?
        '<button class="btn-header btn-cal" onclick="toggleView()">'+(state.view==='cal'?'목록보기':'달력보기')+'</button>'+
        '<button class="btn-header btn-add" onclick="openAdd()">+ 추가</button>'
      :state.page==='articles'?'<button class="btn-header btn-add" onclick="openAddArt()">+ 기사</button>'
      :state.page==='experience'?'<button class="btn-header btn-add" onclick="openAddExp()">+ 경험</button>':'')+
      (photoURL?'<img src="'+esc(photoURL)+'" class="user-avatar" title="'+esc(displayName)+'">':'')+
      (displayName?'<span class="user-name">'+esc(displayName)+'</span>':'')+
      '<button class="btn-header btn-logout" onclick="logout()">로그아웃</button>'+
    '</div>'+
  '</div>';
}

function buildSidebar(){
  return '<div class="sidebar">'+
    NAV.map(n=>'<button class="nav-btn'+(state.page===n.id?' active':'')+'" onclick="navTo(\''+n.id+'\')">'+
      '<span class="nav-icon" style="color:'+(state.page===n.id?M:H)+'">'+n.sym+'</span>'+
      '<span class="nav-label" style="color:'+(state.page===n.id?M:H)+'">'+n.label+'</span>'+
    '</button>').join('')+
  '</div>';
}

function buildPage(){
  if(state.page==='tracker')return'<div id="main-panels" style="display:flex;flex:1;overflow:hidden;">'+(state.view==='cal'?buildCal():buildLeft())+'<div class="resizer" id="main-resizer" onmousedown="startResize(event,\'main-resizer\',\'left-panel\')"></div>'+buildRight()+'</div>';
  if(state.page==='cover')return buildCoverPage();
  if(state.page==='articles')return buildArtsPage();
  if(state.page==='experience')return buildExpPage();
  if(state.page==='passbank')return buildPassBank();
  if(state.page==='study')return buildStudyPage();
  return '';
}

/* ====== LEFT PANEL ====== */
function buildLeft(){
  var flt=getFiltered();
  var w=state.leftW||240;
  return '<div class="left" id="left-panel" style="width:'+w+'px;">'+
    '<div class="search-box"><input type="text" placeholder="검색..." value="'+esc(state.search)+'" oninput="setSearch(this.value)"></div>'+
    buildFilter()+
    '<div class="list-area">'+(flt.length?flt.map(buildCard).join(''):'<div class="no-sel">공고가 없습니다</div>')+'</div>'+
  '</div>';
}
function buildFilter(){
  var cat=CATS.find(c=>c.id===state.cat),sub=cat&&cat.statuses;
  return '<div class="filter-panel">'+
    '<div class="filter-inner">'+
      '<div class="flabel">카테고리</div>'+
      '<div class="cat-grid">'+
        CATS.map(c=>{var on=state.cat===c.id,cnt=c.statuses?state.jobs.filter(j=>c.statuses.includes(j.status)).length:state.jobs.length;
          return'<button class="cat-btn'+(on?' active':'')+'" onclick="setCat(\''+c.id+'\')" style="'+(on?'border-color:'+c.ac+';background:'+c.abg+';':'')+'">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;">'+
              '<span class="cat-name" style="color:'+(on?c.ac:'#333')+'">'+c.label+'</span>'+
              '<span class="cat-cnt" style="background:'+(on?c.ac+'22':ML)+';color:'+(on?c.ac:MU)+'">'+cnt+'</span>'+
            '</div>'+
          '</button>';}).join('')+
      '</div>'+
    '</div>'+
    (sub?
      '<div style="padding:5px 10px;">'+
        '<div class="flabel">세부 상태 <span style="font-weight:400;color:'+H+'">복수선택</span></div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:3px;">'+
          sub.map(sid=>{var s=gs(sid),on=state.astats.includes(sid);return'<button class="chip'+(on?' active':'')+'" onclick="toggleStat(\''+sid+'\')" style="'+(on?'border-color:'+s.c+';background:'+s.bg+';color:'+s.c+';':'color:'+s.c+';')+'">'+s.label+'</button>';}).join('')+
          '<button class="chip" onclick="clearStats()" style="color:'+H+'">전체</button>'+
        '</div>'+
      '</div>'+
      '<div class="sort-row"><span class="flabel" style="margin:0">정렬</span>'+
        '<select onchange="setSort(this.value)" style="font-size:9px;border:1px solid '+MM+';border-radius:5px;padding:1px 4px;background:'+MB+';outline:none;color:#1a1a1a;">'+
          [['deadline','마감일순'],['company','회사명순'],['status','상태순'],['created','등록순']].map(([id,l])=>'<option value="'+id+'"'+(state.sort===id?' selected':'')+'>'+l+'</option>').join('')+

/* ====== DIRTY TRACKING ====== */
function markDirty(dk,taId,field){
  state.dirty[dk]=true;
  var box=document.getElementById('box-'+dk),btn=document.getElementById('savebtn-'+dk),cnt=document.getElementById('cnt-'+taId),ta=document.getElementById(taId);
  if(box){box.style.borderColor='#FDE68A';box.style.background='#FEFDF5';}
  if(btn){btn.disabled=false;btn.style.background=M;btn.style.color='#fff';btn.style.opacity='1';btn.style.cursor='pointer';}

function saveField(dk,taId,field){
  var ta=document.getElementById(taId);if(!ta)return;
  var job=state.jobs.find(j=>j.id===state.selId);if(!job)return;
  job[field]=ta.value;delete state.dirty[dk];saveAll();render();
}
function markDirtySite(dk){
  state.dirty[dk]=true;
  var box=document.getElementById('box-'+dk),btn=document.getElementById('savebtn-'+dk);
  if(box){box.style.borderColor='#FDE68A';box.style.background='#FEFDF5';}
  if(btn){btn.disabled=false;btn.style.background=M;btn.style.color='#fff';btn.style.opacity='1';btn.style.cursor='pointer';}
}
function saveSiteUrl(dk){
  var inp=document.getElementById('inp-siteUrl');if(!inp)return;

function markCLDirty(dk,clId){
  state.dirty[dk]=true;
  var box=document.getElementById('box-'+dk),btn=document.getElementById('savebtn-'+dk);

  if(btn){btn.disabled=false;btn.style.background=M;btn.removeAttribute('style');}

  if(ta&&cnt){var len=ta.value.length,limV=lim?+lim.value:0,over=limV&&len>limV;cnt.textContent=len+'자'+(limV?' / '+limV+'자'+(over?' ⚠ 초과!':''):'');cnt.style.color=over?'#DC2626':H;ta.style.borderColor=over?'#FCA5A5':'';}

function saveCL(clId){
  var job=state.jobs.find(j=>j.id===state.selId);if(!job)return;
  var cl=job.cls.find(c=>c.id===clId);if(!cl)return;

}

/* ====== CALENDAR ====== */
function buildCal(){
  var y=state.calY,m=state.calM,first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  var evs={};
  state.jobs.forEach(job=>{
    if(job.deadline){var d=new Date(job.deadline+'T00:00');if(d.getFullYear()===y&&d.getMonth()===m){var k=d.getDate();if(!evs[k])evs[k]=[];evs[k].push({t:'d',job});}}
    (job.interviews||[]).forEach(iv=>{var d=new Date(iv+'T00:00');if(d.getFullYear()===y&&d.getMonth()===m){var k=d.getDate();if(!evs[k])evs[k]=[];evs[k].push({t:'i',job});}});
  });
  var cells='';
  for(var i=0;i<first;i++)cells+='<div></div>';
  for(var d=1;d<=days;d++){
    var isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var ev=evs[d]||[];
    cells+='<div class="cal-cell'+(isT?' today':'')+'">'+
      '<div style="font-size:13px;font-weight:'+(isT?700:500)+';color:'+(isT?M:'#444')+';margin-bottom:4px;">'+d+'</div>'+
      ev.slice(0,3).map(e=>'<div class="cal-ev '+(e.t==='d'?'dl':'iv')+'" onclick="calSel('+e.job.id+')">'+esc(e.job.company)+(e.t==='i'?' 면접':'')+'</div>').join('')+
      (ev.length>3?'<div style="font-size:10px;color:'+H+';margin-top:2px;">+'+( ev.length-3)+' 더</div>':'')+
    '</div>';
  }
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return '<div class="cal-wrap">'+
    '<div class="cal-nav">'+
      '<button class="cal-nbtn" onclick="calPrev()">&#8249;</button>'+
      '<span style="font-weight:700;font-size:18px;">'+y+'년 '+mn[m]+'</span>'+
      '<button class="cal-nbtn" onclick="calNext()">&#8250;</button>'+
      '<div style="margin-left:auto;display:flex;gap:12px;font-size:12px;color:'+MU+';">'+
        '<span><span style="display:inline-block;width:10px;height:10px;background:#D1FAE5;border-radius:3px;margin-right:4px;vertical-align:middle"></span>마감</span>'+
        '<span><span style="display:inline-block;width:10px;height:10px;background:#FEF3C7;border-radius:3px;margin-right:4px;vertical-align:middle"></span>면접</span>'+
        '<span style="color:'+H+';font-size:11px;">클릭하면 상세로 이동</span>'+
      '</div>'+
    '</div>'+
    '<div class="cal-grid">'+['일','월','화','수','목','금','토'].map(d=>'<div class="cal-dh">'+d+'</div>').join('')+'</div>'+
    '<div class="cal-grid" style="overflow-y:auto;flex:1;align-content:start;margin-top:3px;">'+cells+'</div>'+
  '</div>';
}

/* ====== RESIZE ====== */
function startResize(e,resizerId,panelId){
  e.preventDefault();
  var panel=document.getElementById(panelId);
  var resizer=document.getElementById(resizerId);
  if(!panel)return;
  resizer.classList.add('dragging');
  var startX=e.clientX;
  var startW=panel.offsetWidth;
  function onMove(e){
    var newW=startW+(e.clientX-startX);
    newW=Math.max(160,Math.min(500,newW));
    panel.style.width=newW+'px';
    state.leftW=newW;
  }
  function onUp(){
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.body.style.cursor='';
    document.body.style.userSelect='';
  }
  document.body.style.cursor='col-resize';
  document.body.style.userSelect='none';
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

/* ====== STUDY PAGE ====== */
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

function loadMyStudies(){
  state._studyUnsub.forEach(fn=>fn());
  state._studyUnsub=[];
  // Save user profile on every login
  db.collection('users').doc(currentUser.uid).set({
    displayName:currentUser.displayName||'익명',
    photoURL:currentUser.photoURL||'',
    uid:currentUser.uid
  },{merge:true});
  var unsub=db.collection('studies')
    .where('members','array-contains',currentUser.uid)
    .onSnapshot(function(snap){
      state.myStudies=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      if(state.page==='study') render();
    });
  state._studyUnsub.push(unsub);
}

function selectStudy(id){
  state.selStudy=id;
  state.studyTab='timer';
  state.selPost=null;
  state.timerSessions=[];
  state.studyMembers={};
  loadStudyRealtime(id);
  render();
}

function loadStudyRealtime(studyId){
  state._studyUnsub.slice(1).forEach(fn=>fn());
  state._studyUnsub=state._studyUnsub.slice(0,1);

  var u1=db.collection('todos')
    .where('studyId','==',studyId).where('uid','==',null)
    .onSnapshot(function(snap){
      state.sharedTodos=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      if(state.page==='study') render();
    });

  var u2=db.collection('todos')
    .where('uid','==',currentUser.uid).where('studyId','==',null)
    .onSnapshot(function(snap){
      state.personalTodos=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      if(state.page==='study') render();
    });

  var u3=db.collection('posts')
    .where('studyId','==',studyId)
    .orderBy('createdAt','desc')
    .onSnapshot(function(snap){
      state.posts=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      _answerCache={};
      if(state.page==='study') render();
    });

  var u4=db.collection('timerSessions')
    .where('studyId','==',studyId)
    .where('uid','==',currentUser.uid)
    .orderBy('startedAt','desc')
    .limit(10)
    .onSnapshot(function(snap){
      state.timerSessions=snap.docs.map(d=>Object.assign({id:d.id},d.data()))
        .filter(s=>s.duration>0);
      if(state.page==='study'&&state.studyTab==='timer') render();
    });

  state._studyUnsub.push(u1,u2,u3,u4);

  // Load member profiles
  var study=state.myStudies.find(s=>s.id===studyId);
  if(study&&study.members){
    study.members.forEach(function(uid){
      db.collection('users').doc(uid).get().then(function(doc){
        if(doc.exists) state.studyMembers[uid]=doc.data();
        if(state.page==='study') render();
      });
    });
  }
}

async function createStudy(){
  var name=document.getElementById('new-study-name').value.trim();
  if(!name){alert('스터디 이름을 입력하세요');return;}
  var code=genCode();
  await db.collection('studies').add({
    name,inviteCode:code,
    members:[currentUser.uid],createdBy:currentUser.uid,
    createdAt:new Date()
  });
  state.studyModal=null;render();showToast('스터디 생성! 초대코드: '+code);
}

async function joinStudy(){
  var code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code){alert('초대코드를 입력하세요');return;}
  var snap=await db.collection('studies').where('inviteCode','==',code).get();
  if(snap.empty){alert('초대코드를 찾을 수 없어요.');return;}
  var studyId=snap.docs[0].id;
  await db.collection('studies').doc(studyId).update({
    members:firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  });
  state.studyModal=null;render();showToast('스터디 참여 완료!');
}

async function timerStart(){
  var ref=await db.collection('timerSessions').add({
    uid:currentUser.uid,studyId:state.selStudy,
    startedAt:new Date(),endedAt:null,duration:0
  });
  state.timerSessionId=ref.id;
  state.timerRunning=true;state.timerPaused=false;
  state.timerInterval=setInterval(function(){
    if(!state.timerPaused){
      state.timerElapsed++;
      var d=document.getElementById('timer-display');
      if(d){d.textContent=fmtTime(state.timerElapsed);d.className='timer-display running';}
    }
  },1000);
  render();
}

function timerPause(){
  state.timerPaused=!state.timerPaused;
  render();
}

async function timerStop(){
  clearInterval(state.timerInterval);
  if(state.timerSessionId&&state.timerElapsed>0){
    await db.collection('timerSessions').doc(state.timerSessionId).update({
      endedAt:new Date(),duration:state.timerElapsed
    });
    await db.collection('users').doc(currentUser.uid).set(
      {studyTime:firebase.firestore.FieldValue.increment(state.timerElapsed)},{merge:true}
    );
  }
  state.timerRunning=false;state.timerPaused=false;state.timerSessionId=null;state.timerElapsed=0;
  render();showToast('공부 기록 저장됨 ✓');
}

function fmtTime(s){
  var h=String(Math.floor(s/3600)).padStart(2,'0');
  var m=String(Math.floor(s%3600/60)).padStart(2,'0');
  var sec=String(s%60).padStart(2,'0');
  return h+':'+m+':'+sec;
}

function fmtDate(ts){
  if(!ts)return'';
  var d=ts.toDate?ts.toDate():new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

  var inputId=isShared?'shared-todo-input':'personal-todo-input';
  var val=document.getElementById(inputId).value.trim();
  if(!val)return;
  var today=new Date();today.setHours(0,0,0,0);
  await db.collection('todos').add({
    title:val,done:false,
    studyId:isShared?state.selStudy:null,
    uid:isShared?null:currentUser.uid,
    dueDate:today,
    createdAt:new Date()
  });
  document.getElementById(inputId).value='';
}

async function toggleTodo(id,done){
  await db.collection('todos').doc(id).update({done:!done});
}

async function deleteTodo(id){
  await db.collection('todos').doc(id).delete();
}

var _qaImageBase64='';
function handleQAImage(input){
  var file=input.files[0];
  if(!file)return;
  if(file.size>500000){alert('이미지가 너무 커요. 500KB 이하로 올려주세요.');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    _qaImageBase64=e.target.result;
    var preview=document.getElementById('qa-img-preview');
    if(preview){preview.src=_qaImageBase64;preview.style.display='block';}
  };
  reader.readAsDataURL(file);
}

async function addPost(){
  var title=document.getElementById('qa-title').value.trim();
  var body=document.getElementById('qa-body').value.trim();
  var tags=document.getElementById('qa-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!title){alert('제목을 입력하세요');return;}
  await db.collection('posts').add({
    title,body,tags,
    uid:currentUser.uid,
    displayName:currentUser.displayName||'익명',
    photoURL:currentUser.photoURL||'',
    imageBase64:_qaImageBase64||'',
    studyId:state.selStudy,
    answerCount:0,
    createdAt:new Date()
  });
  _qaImageBase64='';
  state.showQAForm=false;showToast('질문 등록됨 ✓');
}

async function addAnswer(){
  var body=document.getElementById('ans-body').value.trim();
  var url=document.getElementById('ans-url').value.trim();
  if(!body){alert('답변 내용을 입력하세요');return;}
  await db.collection('posts').doc(state.selPost).collection('answers').add({
    body,solutionUrl:url,
    uid:currentUser.uid,
    displayName:currentUser.displayName||'익명',
    photoURL:currentUser.photoURL||'',
    isAccepted:false,
    createdAt:new Date()
  });
  await db.collection('posts').doc(state.selPost).update({
    answerCount:firebase.firestore.FieldValue.increment(1)
  });
  state.showAnsForm=false;showToast('답변 등록됨 ✓');
}

async function acceptAnswer(answerId){
  await db.collection('posts').doc(state.selPost).collection('answers').doc(answerId).update({isAccepted:true});
  _answerCache={};showToast('답변 채택됨 ✓');
}

async function loadAnswers(postId){
  var snap=await db.collection('posts').doc(postId).collection('answers').orderBy('createdAt').get();
  return snap.docs.map(d=>Object.assign({id:d.id},d.data()));
}

function buildStudyCalendar(){
  var y=state.studyCalY,m=state.studyCalM;
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  var today=new Date();
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // Map todos to dates
  var todosByDate={};
  var allTodos=state.sharedTodos.concat(state.personalTodos);
  allTodos.forEach(function(t){
    if(!t.dueDate)return;
    var d=t.dueDate.toDate?t.dueDate.toDate():new Date(t.dueDate);
    if(d.getFullYear()===y&&d.getMonth()===m){
      var k=d.getDate();
      if(!todosByDate[k])todosByDate[k]=[];
      todosByDate[k].push(t);
    }
  });

  var cells='';
  for(var i=0;i<first;i++)cells+='<div></div>';
  for(var d=1;d<=days;d++){
    var isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var todos=todosByDate[d]||[];
    var doneCnt=todos.filter(t=>t.done).length;
    cells+='<div style="min-height:80px;padding:6px;border:1.5px solid '+(isT?'var(--mint)':'var(--br)')+';border-radius:10px;background:'+(isT?'var(--mintl)':'#fff')+';">'+
      '<div style="font-size:12px;font-weight:'+(isT?700:500)+';color:'+(isT?'var(--mint)':'#444')+';margin-bottom:3px;">'+d+'</div>'+
      todos.slice(0,3).map(function(t){
        return '<div style="font-size:10px;padding:2px 5px;border-radius:5px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+
          'background:'+(t.done?'#D1FAE5':'var(--mintl)')+';color:'+(t.done?'#065F46':'var(--mint)')+';'+
          (t.done?'text-decoration:line-through;':'')+'">'+(t.done?'✓ ':'')+esc(t.title)+'</div>';
      }).join('')+
      (todos.length>3?'<div style="font-size:9px;color:var(--h);">+'+( todos.length-3)+' 더</div>':'')+
      (isT&&todos.length>0?'<div style="font-size:9px;color:var(--mint);font-weight:600;margin-top:2px;">'+doneCnt+'/'+todos.length+' 완료</div>':'')+
    '</div>';
  }

  return '<div style="padding-bottom:16px;">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">'+
      '<button onclick="state.studyCalM--;if(state.studyCalM<0){state.studyCalM=11;state.studyCalY--;}render()" class="cal-nbtn">&#8249;</button>'+
      '<span style="font-weight:700;font-size:16px;">'+y+'년 '+mn[m]+'</span>'+
      '<button onclick="state.studyCalM++;if(state.studyCalM>11){state.studyCalM=0;state.studyCalY++;}render()" class="cal-nbtn">&#8250;</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">'+
      ['일','월','화','수','목','금','토'].map(d=>'<div style="font-size:11px;text-align:center;color:var(--h);padding:4px 0;font-weight:700;">'+d+'</div>').join('')+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">'+cells+'</div>'+
  '</div>';
}

      '<div style="font-size:15px;font-weight:700;margin-bottom:8px;">'+esc(post.title)+'</div>'+
      '<div style="font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.7;">'+esc(post.body||'')+'</div>'+

    '</div>'+
    '<div style="font-size:12px;font-weight:700;color:var(--mu);margin:12px 0 8px;">답변 '+answers.length+'개</div>'+

      return '<div class="answer-box'+(a.isAccepted?' accepted':'')+'">'+
        (a.isAccepted?'<div style="font-size:10px;color:var(--mint);font-weight:700;margin-bottom:6px;">✓ 채택된 답변</div>':'')+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">'+
          avatar(a.photoURL,a.displayName,22)+
          '<span style="font-size:12px;font-weight:600;color:var(--text2);">'+esc(a.displayName||'익명')+'</span>'+
        '</div>'+
        '<div style="font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.7;">'+esc(a.body)+'</div>'+
        (a.solutionUrl?'<a href="'+esc(a.solutionUrl)+'" target="_blank" style="font-size:11px;color:var(--mint);display:inline-block;margin-top:6px;padding:4px 10px;border:1px solid var(--mintm);border-radius:6px;text-decoration:none;background:var(--mintl);">풀이 보기 ↗</a>':'')+
        (!a.isAccepted&&!isMine&&isAuthor?

            '<button onclick="acceptAnswer(\''+a.id+'\')" style="border:none;background:var(--mintl);color:var(--mint);padding:4px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;">채택하기</button>'+
          '</div>':'')+
      '</div>';
    }).join('')+
    '<div style="margin-top:14px;">'+
      '<button class="study-btn" style="padding:9px;margin-bottom:8px;" onclick="state.showAnsForm=!state.showAnsForm;render()">'+
        (state.showAnsForm?'✕ 취소':'+ 답변 작성')+
      '</button>'+
      (state.showAnsForm?

function selectStudy(id){
  state.selStudy=id;
  state.studyTab='timer';
  state.selPost=null;
  loadStudyRealtime(id);
  render();
}

function loadStudyRealtime(studyId){
  state._studyUnsub.slice(1).forEach(fn=>fn());
  state._studyUnsub=state._studyUnsub.slice(0,1);

  var u1=db.collection('todos')
    .where('studyId','==',studyId).where('uid','==',null)
    .onSnapshot(function(snap){
      state.sharedTodos=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      if(state.page==='study'&&state.studyTab==='todos') render();
    });

  var u2=db.collection('todos')
    .where('uid','==',currentUser.uid).where('studyId','==',null)
    .onSnapshot(function(snap){
      state.personalTodos=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      if(state.page==='study'&&state.studyTab==='todos') render();
    });

  var u3=db.collection('posts')
    .where('studyId','==',studyId)
    .orderBy('createdAt','desc')
    .onSnapshot(function(snap){
      state.posts=snap.docs.map(d=>Object.assign({id:d.id},d.data()));
      if(state.page==='study'&&state.studyTab==='qa') render();
    });

  state._studyUnsub.push(u1,u2,u3);
}

async function createStudy(){
  var name=document.getElementById('new-study-name').value.trim();
  if(!name){alert('스터디 이름을 입력하세요');return;}
  var code=genCode();
  await db.collection('studies').add({
    name,inviteCode:code,
    members:[currentUser.uid],createdBy:currentUser.uid,
    createdAt:new Date()
  });
  state.studyModal=null;render();showToast('스터디 생성 완료! 코드: '+code);
}

async function joinStudy(){
  var code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code){alert('초대코드를 입력하세요');return;}
  var snap=await db.collection('studies').where('inviteCode','==',code).get();
  if(snap.empty){alert('초대코드를 찾을 수 없어요.');return;}
  var studyId=snap.docs[0].id;
  await db.collection('studies').doc(studyId).update({
    members:firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  });
  state.studyModal=null;render();showToast('스터디 참여 완료!');
}

async function timerStart(){
  var ref=await db.collection('timerSessions').add({
    uid:currentUser.uid,studyId:state.selStudy,
    startedAt:new Date(),endedAt:null,duration:0
  });
  state.timerSessionId=ref.id;
  state.timerRunning=true;
  state.timerInterval=setInterval(function(){
    state.timerElapsed++;
    var d=document.getElementById('timer-display');
    if(d){d.textContent=fmtTime(state.timerElapsed);d.className='timer-display running';}
  },1000);
  render();
}

async function timerStop(){
  clearInterval(state.timerInterval);
  if(state.timerSessionId){
    await db.collection('timerSessions').doc(state.timerSessionId).update({
      endedAt:new Date(),duration:state.timerElapsed
    });
    await db.collection('users').doc(currentUser.uid).set(
      {studyTime:firebase.firestore.FieldValue.increment(state.timerElapsed)},{merge:true}
    );
  }
  state.timerRunning=false;state.timerSessionId=null;state.timerElapsed=0;
  render();showToast('공부 기록 저장됨');
}

function fmtTime(s){
  var h=String(Math.floor(s/3600)).padStart(2,'0');
  var m=String(Math.floor(s%3600/60)).padStart(2,'0');
  var sec=String(s%60).padStart(2,'0');
  return h+':'+m+':'+sec;
}

async function addTodo(isShared){
  var inputId=isShared?'shared-todo-input':'personal-todo-input';
  var val=document.getElementById(inputId).value.trim();
  if(!val)return;
  await db.collection('todos').add({
    title:val,done:false,
    studyId:isShared?state.selStudy:null,
    uid:isShared?null:currentUser.uid,
    createdAt:new Date()
  });
  document.getElementById(inputId).value='';
}

async function toggleTodo(id,done){
  await db.collection('todos').doc(id).update({done:!done});

async function deleteTodo(id){

}

async function addPost(){
  var title=document.getElementById('qa-title').value.trim();
  var body=document.getElementById('qa-body').value.trim();
  var tags=document.getElementById('qa-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!title){alert('제목을 입력하세요');return;}
  await db.collection('posts').add({
    title,body,tags,
    uid:currentUser.uid,
    displayName:currentUser.displayName||'익명',
    studyId:state.selStudy,
    answerCount:0,
    createdAt:new Date()
  });
  state.showQAForm=false;render();showToast('질문 등록됨');
}

async function addAnswer(){
  var body=document.getElementById('ans-body').value.trim();
  var url=document.getElementById('ans-url').value.trim();
  if(!body){alert('답변 내용을 입력하세요');return;}
  await db.collection('posts').doc(state.selPost).collection('answers').add({
    body,solutionUrl:url,
    uid:currentUser.uid,
    displayName:currentUser.displayName||'익명',
    isAccepted:false,
    createdAt:new Date()
  });
  await db.collection('posts').doc(state.selPost).update({
    answerCount:firebase.firestore.FieldValue.increment(1)
  });
  state.showAnsForm=false;render();showToast('답변 등록됨');
}

async function acceptAnswer(answerId){
  await db.collection('posts').doc(state.selPost).collection('answers').doc(answerId).update({isAccepted:true});
  render();showToast('답변 채택됨 ✓');
}

async function loadAnswers(postId){
  var snap=await db.collection('posts').doc(postId).collection('answers').orderBy('createdAt').get();
  return snap.docs.map(d=>Object.assign({id:d.id},d.data()));
}

  if(!comp||!role){alert('회사명과 직무는 필수입니다.');return;}
  var iv=document.getElementById('m-iv').value;
  var interviews=iv?iv.split(',').map(s=>s.trim()).filter(Boolean):[];
  var d={company:comp,role:role,status:state.editJob.status||'none',deadline:document.getElementById('m-deadline').value,deadlineTime:document.getElementById('m-dtime').value,industry:document.getElementById('m-industry').value.trim(),siteUrl:document.getElementById('m-site').value.trim(),interviews};
  if(state.modal==='add'){var nj=Object.assign({id:Date.now(),ia:'',ca:'',ja:'',jd:'',cls:[],memo:'',ca_at:Date.now()},d);state.jobs.push(nj);state.selId=nj.id;state.tab='기본정보';}
  else{var j=state.jobs.find(j=>j.id===state.editJob.id);if(j)Object.assign(j,d);}
  state.modal=null;state.editJob=null;saveAll();render();
}
function addCL(){var j=state.jobs.find(j=>j.id===state.selId);if(j){if(!j.cls)j.cls=[];j.cls.push({id:Date.now(),q:'',a:'',lim:500});saveAll();render();}}
function deleteCL(cid){if(!confirm('이 문항을 삭제하시겠어요?'))return;var j=state.jobs.find(j=>j.id===state.selId);if(j){j.cls=j.cls.filter(c=>c.id!==cid);saveAll();render();}}
function calPrev(){state.calM--;if(state.calM<0){state.calM=11;state.calY--;}render();}
function calNext(){state.calM++;if(state.calM>11){state.calM=0;state.calY++;}render();}

function selArt(id){state.selArt=id;state.editArt=null;render();}
function openAddArt(){state.editArt={id:null,title:'',url:'',company:'',tags:[],memo:'',date:'',ca_at:Date.now()};state.selArt=null;render();}
function editArtClick(id){var a=state.arts.find(x=>x.id===id);if(a){state.editArt=JSON.parse(JSON.stringify(a));render();}}
function deleteArt(id){if(!confirm('이 기사를 삭제하시겠어요?'))return;state.arts=state.arts.filter(a=>a.id!==id);if(state.selArt===id)state.selArt=null;saveAll();render();}
function cancelArt(){state.editArt=null;render();}
function saveArt(){
  var title=document.getElementById('art-title').value.trim();if(!title){alert('제목을 입력하세요');return;}
  var tagsRaw=document.getElementById('art-tags').value;
  var tags=tagsRaw?tagsRaw.split(',').map(s=>s.trim()).filter(Boolean):[];
  var d={title,url:document.getElementById('art-url').value.trim(),company:document.getElementById('art-company').value.trim(),tags,memo:document.getElementById('art-memo').value,date:document.getElementById('art-date').value};
  if(state.editArt&&state.editArt.id){var a=state.arts.find(x=>x.id===state.editArt.id);if(a)Object.assign(a,d);state.selArt=state.editArt.id;}
  else{var na=Object.assign({id:Date.now(),ca_at:Date.now()},d);state.arts.push(na);state.selArt=na.id;}
  state.editArt=null;saveAll();render();
}
